<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Finesse OS · Keka's Blessings From Heaven</title>
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ===== Finesse OS — premium admin theme ===== */
    :root {
      --fos-ink: #0b1220;
      --fos-teal: #0f8e83;
      --fos-aqua: #38d6c6;
    }

    /* Premium typeface across the whole studio */
    body, input, textarea, select, button, [class*="css-"] {
      font-family: "Jost", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    }

    /* ===================== EDITOR CHROME THEME ===================== */
    /* Decap embeds stable component labels in its hashed classes, so we
       target with [class*="Label"] selectors that survive hash changes. */

    /* App background */
    [class*="AppMainContainer"], [class*="EditorContainer"], [class*="CollectionMain"] {
      background: #eef3f6 !important;
    }

    /* Top app bar -> branded midnight/teal */
    [class*="AppHeader"] {
      background: linear-gradient(90deg, #0b1220 0%, #0e3b3a 75%, #0f6f6a 140%) !important;
      box-shadow: 0 6px 24px -14px rgba(0, 0, 0, 0.6) !important;
      border: 0 !important;
    }
    [class*="AppHeaderContent"], [class*="AppHeader"] a, [class*="AppHeader"] button,
    [class*="AppHeaderSiteLink"], [class*="AppHeaderNavLink"] { color: rgba(255, 255, 255, 0.82) !important; }
    [class*="AppHeader"] svg { fill: currentColor !important; color: rgba(255, 255, 255, 0.82) !important; }
    [class*="AppHeaderNavLink"]:hover, [class*="AppHeader"] a:hover { color: #fff !important; }
    [class*="AppHeaderNavLink"][class*="active"], a[aria-current="page"][class*="AppHeaderNavLink"] {
      color: var(--fos-aqua) !important;
    }
    [class*="AppHeaderActions"] [class*="button"], [class*="QuickNew"] {
      background: linear-gradient(135deg, var(--fos-aqua), var(--fos-teal)) !important;
      color: #04201d !important; border: 0 !important; box-shadow: none !important;
    }

    /* Sidebar / collections */
    [class*="SidebarContainer"] {
      border-radius: 16px !important;
      border: 1px solid #e4e9ed !important;
      box-shadow: 0 18px 46px -28px rgba(11, 18, 32, 0.4) !important;
    }
    [class*="SidebarHeading"] { color: var(--fos-ink) !important; }
    [class*="NavLink"] { border-radius: 10px !important; }
    [class*="NavLink"]:hover { background: #e0f5f1 !important; color: var(--fos-teal) !important; }
    [class*="NavLink"][class*="active"], a[aria-current="page"][class*="NavLink"], li[class*="active"] > a[class*="NavLink"] {
      background: linear-gradient(135deg, rgba(56, 214, 198, 0.20), rgba(15, 142, 131, 0.14)) !important;
      color: var(--fos-teal) !important;
      box-shadow: inset 3px 0 0 var(--fos-teal) !important;
    }
    [class*="NavLink"] svg { color: currentColor !important; }

    /* Collection header */
    [class*="CollectionTopHeading"] {
      font-family: "Cormorant Garamond", serif !important;
      font-weight: 600 !important; color: var(--fos-ink) !important; letter-spacing: 0.3px !important;
    }

    /* Entry cards */
    [class*="ListCard"], [class*="GridCard"], li[class*="Card"], a[class*="Card"] {
      border-radius: 16px !important;
      border: 1px solid #e7ecef !important;
      box-shadow: 0 14px 36px -24px rgba(11, 18, 32, 0.4) !important;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease !important;
    }
    [class*="ListCard"]:hover, [class*="GridCard"]:hover, a[class*="Card"]:hover {
      transform: translateY(-3px) !important;
      box-shadow: 0 24px 50px -24px rgba(11, 18, 32, 0.45) !important;
      border-color: var(--fos-aqua) !important;
    }
    [class*="CardHeading"] { color: var(--fos-ink) !important; }

    /* Recolor leftover Decap blue accents to teal */
    [class*="-blue-"], [class*="primary"][class*="button"] {
      background-color: var(--fos-teal) !important;
      border-color: var(--fos-teal) !important;
    }
    a { color: var(--fos-teal); }

    /* Save / Publish controls bar */
    [class*="ControlBar"], [class*="EditorControlBar"], [class*="ToolbarContainer"] {
      background: #0b1220 !important;
    }
    [class*="ControlBar"] [class*="button"], [class*="Publish"] {
      background: linear-gradient(135deg, var(--fos-aqua), var(--fos-teal)) !important;
      color: #04201d !important;
    }

    /* ---------- Branded LOGIN screen (classes added by script below) ---------- */
    html.finesse-login, html.finesse-login body { height: 100%; }
    html.finesse-login body {
      background:
        radial-gradient(1100px 560px at 72% -12%, rgba(56, 214, 198, 0.28), transparent 60%),
        radial-gradient(900px 500px at 8% 110%, rgba(15, 142, 131, 0.30), transparent 55%),
        linear-gradient(140deg, #0b1220 0%, #0e3a39 58%, #0f8e83 150%) !important;
    }

    #finesse-brand { text-align: center; margin: 0 0 22px; }
    #finesse-brand .finesse-logo {
      height: 92px; width: auto; display: block; margin: 0 auto 16px;
      filter: drop-shadow(0 10px 26px rgba(0, 0, 0, 0.45));
    }
    #finesse-brand .finesse-os {
      font-family: "Cormorant Garamond", serif; font-weight: 600;
      font-size: 2.35rem; line-height: 1; color: #fff; letter-spacing: 0.5px;
    }
    #finesse-brand .finesse-os b { color: var(--fos-aqua); font-weight: 600; }
    #finesse-brand .finesse-sub {
      margin-top: 8px; color: rgba(255, 255, 255, 0.72);
      font-size: 0.74rem; letter-spacing: 0.22em; text-transform: uppercase;
    }

    .finesse-card {
      background: rgba(255, 255, 255, 0.07) !important;
      -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.16) !important;
      border-radius: 24px !important;
      box-shadow: 0 40px 90px -34px rgba(0, 0, 0, 0.75) !important;
      padding: 46px 42px !important;
      max-width: 430px !important; width: 92% !important;
    }
    .finesse-card img:not(.finesse-logo) { display: none !important; } /* hide Decap's default logo, we show our own */

    .finesse-btn {
      background: linear-gradient(135deg, var(--fos-aqua), var(--fos-teal)) !important;
      color: #04201d !important; border: 0 !important;
      border-radius: 100px !important; padding: 0.95rem 1.7rem !important;
      font-weight: 600 !important; letter-spacing: 0.02em !important;
      box-shadow: 0 16px 34px -14px rgba(56, 214, 198, 0.65) !important;
      transition: transform 0.2s ease !important;
    }
    .finesse-btn:hover { transform: translateY(-1px) !important; }

    /* ---------- Persistent Finesse OS badge ---------- */
    #finesse-badge {
      position: fixed; left: 14px; bottom: 12px; z-index: 9999;
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 11px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--fos-teal); background: rgba(255, 255, 255, 0.92);
      border: 1px solid #d8e6e2; padding: 5px 11px; border-radius: 100px;
      box-shadow: 0 8px 22px -10px rgba(0, 0, 0, 0.3); pointer-events: none;
    }
    #finesse-badge::before {
      content: ""; width: 7px; height: 7px; border-radius: 50%;
      background: var(--fos-aqua); box-shadow: 0 0 0 3px rgba(56, 214, 198, 0.25);
    }
    html.finesse-login #finesse-badge { background: rgba(255, 255, 255, 0.14); color: #fff; border-color: rgba(255,255,255,0.25); }
  </style>
</head>
<body>
  <!-- Netlify Identity: secure email/password login -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.3.3/dist/decap-cms.js"></script>

  <!-- Finesse OS branding layer -->
  <script>
    (function () {
      var LOGO = "https://dl.dropboxusercontent.com/scl/fi/1d2tihe6utpfhp7ihyif8/Untitled-design.png?rlkey=8lc9p3oa2k40ftlwfks9bnjzy&raw=1";

      function ensureBadge() {
        try {
          if (document.body && !document.getElementById("finesse-badge")) {
            var b = document.createElement("div");
            b.id = "finesse-badge";
            b.appendChild(document.createTextNode("Finesse OS"));
            document.body.appendChild(b);
          }
        } catch (e) {}
      }

      function brand() {
        try {
          ensureBadge();
          var nodes = Array.prototype.slice.call(document.querySelectorAll("button, a"));
          var loginBtn = null;
          for (var i = 0; i < nodes.length; i++) {
            if (/netlify identity/i.test(nodes[i].textContent || "")) { loginBtn = nodes[i]; break; }
          }
          if (loginBtn) {
            document.documentElement.classList.add("finesse-login");
            loginBtn.classList.add("finesse-btn");
            var card = loginBtn.closest("div") || loginBtn.parentNode;
            if (card) card.classList.add("finesse-card");
            if (card && !document.getElementById("finesse-brand")) {
              var d = document.createElement("div");
              d.id = "finesse-brand";
              d.innerHTML =
                '<img class="finesse-logo" src="' + LOGO + '" alt="Keka\'s Blessings" />' +
                '<div class="finesse-os">Finesse <b>OS</b></div>' +
                '<div class="finesse-sub">Content Studio &middot; Keka\'s Blessings</div>';
              card.insertBefore(d, card.firstChild);
            }
          } else {
            document.documentElement.classList.remove("finesse-login");
          }
        } catch (e) {}
      }

      // Give each settings card a relevant photo banner (matches the live site sections)
      var IMGBASE = "https://images.unsplash.com/photo-";
      var CROP = "?fm=jpg&q=75&w=640&h=320&fit=crop";
      var CARD_IMG = {
        "top banner": "1613791716702-9fc08004a5be",
        "home page": "1613791716702-9fc08004a5be",
        "about": "1610289982320-3891f7c9fd6d",
        "financing": "1630168258841-ea0ae143ee1f",
        "legal": "1633219664572-473fd988a44f",
        "polic": "1633219664572-473fd988a44f",
        "branding": "1680669115320-e874dd7dbe08",
        "contact": "1680669115320-e874dd7dbe08",
        "service": "1650174378624-c9ab2c99e512",
        "pricing": "1650174378624-c9ab2c99e512",
        "promo": "1733055709829-09d18fe1ae28",
        "offer": "1733055709829-09d18fe1ae28",
        "review": "1704292224744-139b484352d3",
        "gallery": "1729439535483-7f38204ead4c",
        "photo": "1729439535483-7f38204ead4c"
      };
      function pickImg(t) {
        for (var k in CARD_IMG) { if (t.indexOf(k) >= 0) return IMGBASE + CARD_IMG[k] + CROP; }
        return IMGBASE + "1613791716702-9fc08004a5be" + CROP;
      }
      function decorateCards() {
        try {
          var heads = document.querySelectorAll('[class*="CardHeading"]');
          for (var i = 0; i < heads.length; i++) {
            var h = heads[i];
            var card = h.closest("a") || h.parentNode;
            if (!card || card.getAttribute("data-fos")) continue;
            card.setAttribute("data-fos", "1");
            card.style.position = "relative";
            card.style.overflow = "hidden";
            card.style.paddingTop = "172px";
            var im = document.createElement("div");
            im.style.cssText =
              "position:absolute;top:0;left:0;right:0;height:154px;" +
              "background-color:#0e3b3a;background-size:cover;background-position:center;" +
              'background-image:linear-gradient(180deg,rgba(11,18,32,0.04),rgba(11,18,32,0.22)),url("' +
              pickImg((h.textContent || "").toLowerCase()) + '");';
            card.insertBefore(im, card.firstChild);
          }
        } catch (e) {}
      }

      function start() {
        if (!document.body) { return setTimeout(start, 60); }
        function tick() { brand(); decorateCards(); }
        try {
          var obs = new MutationObserver(tick);
          obs.observe(document.body, { childList: true, subtree: true });
        } catch (e) {}
        tick();
        // keep re-checking for cards that mount after login / collection switches
        setInterval(tick, 700);
      }
      start();
    })();
  </script>
</body>
</html>
